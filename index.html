<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW DAWN Tattoo Motive Generator</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#1a1a1a,#000 55%);color:#fff;font-family:Arial,Helvetica,sans-serif}
.app{max-width:560px;margin:0 auto;padding:22px}
.header{text-align:center;padding:22px 0}
.mark{letter-spacing:10px;color:#777;font-size:14px;margin-bottom:18px}
h1{font-size:36px;line-height:1.05;margin:0;font-weight:900}
.sub{color:#888;letter-spacing:4px;font-size:12px;margin-top:12px}
.card{background:linear-gradient(180deg,#121212,#050505);border:1px solid #333;border-radius:24px;padding:20px;margin:16px 0}
label{display:block;margin:14px 0 7px;color:#888;font-size:11px;letter-spacing:3px;text-transform:uppercase}
textarea,select,input{width:100%;background:#000;border:1px solid #3a3a3a;color:#fff;border-radius:14px;padding:14px;font-size:16px;outline:none}
textarea{min-height:110px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button,a.btn{display:flex;align-items:center;justify-content:center;width:100%;margin-top:14px;padding:16px;border-radius:14px;border:none;background:#fff;color:#000;font-weight:900;font-size:15px;text-decoration:none;cursor:pointer;letter-spacing:1px}
button.dark{background:#191919;border:1px solid #333;color:#fff}
a.green{background:#15a34a;color:#fff}
.preview{background:#000;border:1px solid #333;border-radius:24px;padding:16px;text-align:center}
#art{width:100%;max-width:420px;height:auto;background:#050505;border-radius:18px}
.prompt{background:#000;border:1px solid #333;border-radius:18px;padding:16px;color:#ccc;line-height:1.5;font-size:14px}
.footer{text-align:center;color:#555;font-size:10px;letter-spacing:5px;padding:30px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="mark">ND//24</div>
<h1>NEW DAWN<br>TATTOO GENERATOR</h1>
<div class="sub">BENEATH THE SURFACE</div>
</div>

<div class="card">
<label>Motiv / Idee</label>
<textarea id="idea">Skull, smoke, broken smiley, hidden meaning</textarea>
<div class="grid">
<div><label>Style</label><select id="style"><option>BLACK & GREY</option><option>XR SERIES</option><option>BENEATH THE SURFACE</option><option>LETTERING</option><option>DARK SURREAL</option><option>BIKER ROAD</option></select></div>
<div><label>Körperstelle</label><select id="place"><option>Unterarm</option><option>Oberarm</option><option>Brust</option><option>Rücken</option><option>Bein</option><option>Hand</option></select></div>
</div>
<button onclick="generate()">MOTIV ERSTELLEN</button>
<button class="dark" onclick="randomIdea()">RANDOM</button>
<button class="dark" onclick="downloadPNG()">PNG DOWNLOAD</button>
<button class="dark" onclick="copyPrompt()">PROMPT KOPIEREN</button>
<a id="wa" class="btn green" target="_blank">WHATSAPP ANFRAGE</a>
</div>

<div class="preview">
<svg id="art" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="1000" fill="#050505"/>
</svg>
</div>

<div class="card">
<label>KI / Tattoo Prompt</label>
<div class="prompt" id="promptBox">Prompt erscheint hier.</div>
</div>

<div class="footer">AUTHENTICITY OVER IMAGE</div>
</div>

<script>
const ideas=[
"Skull, smoke, broken smiley, hidden meaning",
"Open book, cross, clouds and memory",
"Raven, candle, hidden skull",
"Road line, freedom, broken border",
"Angel statue, cracked face, smoke",
"X-ray skull, bones, negative space",
"Motorcycle helmet, storm, anti image"
];

function val(id){return document.getElementById(id).value}

function randomIdea(){
document.getElementById("idea").value=ideas[Math.floor(Math.random()*ideas.length)];
const styles=["BLACK & GREY","XR SERIES","BENEATH THE SURFACE","LETTERING","DARK SURREAL","BIKER ROAD"];
document.getElementById("style").value=styles[Math.floor(Math.random()*styles.length)];
generate();
}

function generate(){
const idea=val("idea");
const style=val("style");
const place=val("place");
const lower=idea.toLowerCase();
let main="skull";
if(lower.includes("raven")||lower.includes("bird")) main="raven";
if(lower.includes("book")||lower.includes("cross")) main="book";
if(lower.includes("road")||lower.includes("line")) main="road";
if(lower.includes("angel")) main="angel";
if(lower.includes("letter")) main="lettering";
const prompt=style+" tattoo motive. Idea: "+idea+". Placement: "+place+". Strong black and grey contrast, clean negative space, stencil-ready composition, original design, NEW DAWN energy, beneath the surface feeling.";
document.getElementById("promptBox").innerText=prompt;
document.getElementById("wa").href="https://wa.me/?text="+encodeURIComponent("NEW DAWN TATTOOZ\n\nTattoo Anfrage:\n\n"+prompt);
draw(main,style,idea);
}

function base(svg){
svg.innerHTML='<defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/></filter><radialGradient id="fade" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#050505"/></radialGradient></defs><rect width="800" height="1000" fill="url(#fade)"/><g opacity=".12"><path d="M70 110 H730 M70 890 H730 M110 70 V930 M690 70 V930" stroke="#fff" stroke-width="2"/></g><text x="400" y="70" text-anchor="middle" fill="#777" font-size="24" letter-spacing="12">ND//24</text><text x="400" y="945" text-anchor="middle" fill="#777" font-size="18" letter-spacing="8">BENEATH THE SURFACE</text>';
}

function draw(type,style,idea){
const svg=document.getElementById("art");
base(svg);
if(type==="skull") skull(svg,style);
if(type==="raven") raven(svg);
if(type==="book") book(svg);
if(type==="road") road(svg);
if(type==="angel") angel(svg);
if(type==="lettering") lettering(svg);
smoke(svg);
ndMark(svg);
}

function skull(svg,style){
svg.innerHTML+='<g filter="url(#rough)" transform="translate(0,10)"><ellipse cx="400" cy="360" rx="145" ry="170" fill="none" stroke="#f2f2f2" stroke-width="18"/><path d="M285 450 Q400 560 515 450 L490 620 Q400 690 310 620 Z" fill="none" stroke="#f2f2f2" stroke-width="14"/><ellipse cx="345" cy="360" rx="42" ry="55" fill="#000" stroke="#fff" stroke-width="8"/><ellipse cx="455" cy="360" rx="42" ry="55" fill="#000" stroke="#fff" stroke-width="8"/><path d="M400 410 L370 500 H430 Z" fill="#000" stroke="#fff" stroke-width="7"/><path d="M330 570 H470 M340 600 H460 M360 630 H440" stroke="#fff" stroke-width="8"/>'+(style==="XR SERIES"?'<path d="M285 330 C420 380 390 560 520 610" stroke="#fff" stroke-width="9" opacity=".55"/><path d="M315 265 C455 355 390 470 510 545" stroke="#fff" stroke-width="5" opacity=".4"/>':'')+'</g>';
}

function raven(svg){
svg.innerHTML+='<g filter="url(#rough)" fill="none" stroke="#fff" stroke-width="14"><path d="M180 520 C300 260 520 260 650 520"/><path d="M270 505 C340 410 460 410 530 505"/><path d="M395 390 L430 500 L370 500 Z"/><path d="M400 510 C380 610 420 680 390 780"/><path d="M300 575 C230 650 190 725 155 830"/><path d="M500 575 C570 650 610 725 645 830"/></g>';
}

function book(svg){
svg.innerHTML+='<g filter="url(#rough)" fill="none" stroke="#fff" stroke-width="13"><path d="M180 360 C270 320 345 340 400 420 C455 340 530 320 620 360 V680 C530 640 455 660 400 735 C345 660 270 640 180 680 Z"/><path d="M400 420 V735"/><path d="M360 270 V505 M300 350 H420" stroke-width="18"/><path d="M480 360 C530 390 560 450 545 520" opacity=".55"/></g>';
}

function road(svg){
svg.innerHTML+='<g filter="url(#rough)"><path d="M170 850 L350 210 H450 L630 850 Z" fill="none" stroke="#fff" stroke-width="13"/><path d="M390 850 V210 M410 850 V210" stroke="#fff" stroke-width="9"/><path d="M350 650 L460 500 L390 500 L500 330" stroke="#fff" stroke-width="13"/></g>';
}

function angel(svg){
svg.innerHTML+='<g filter="url(#rough)" fill="none" stroke="#fff" stroke-width="13"><ellipse cx="400" cy="260" rx="65" ry="80"/><path d="M350 340 C260 430 240 570 190 720"/><path d="M450 340 C540 430 560 570 610 720"/><path d="M400 340 V720"/><path d="M320 480 C250 520 210 590 160 680"/><path d="M480 480 C550 520 590 590 640 680"/><path d="M350 250 L455 310" opacity=".6"/></g>';
}

function lettering(svg){
svg.innerHTML+='<g filter="url(#rough)"><text x="400" y="430" text-anchor="middle" fill="#fff" font-size="92" font-weight="900">NEW</text><text x="400" y="535" text-anchor="middle" fill="#fff" font-size="92" font-weight="900">DAWN</text><text x="400" y="610" text-anchor="middle" fill="#777" font-size="26" letter-spacing="8">CUSTOM LETTERING</text></g>';
}

function smoke(svg){
for(let i=0;i<9;i++){
const x=160+Math.random()*480;
const y=180+Math.random()*560;
const w=80+Math.random()*180;
svg.innerHTML+='<path d="M'+x+' '+y+' C'+(x+w)+' '+(y-70)+', '+(x-w)+' '+(y+80)+', '+(x+w/2)+' '+(y+140)+'" fill="none" stroke="#fff" stroke-width="'+(2+Math.random()*5)+'" opacity=".12"/>';
}
}

function ndMark(svg){
svg.innerHTML+='<g transform="translate(336 735) scale(.7)" opacity=".8" fill="#fff"><rect x="70" y="0" width="34" height="190"/><rect x="130" y="0" width="34" height="190"/><rect x="20" y="105" width="34" height="190" transform="rotate(25 37 200)"/><rect x="130" y="-20" width="34" height="170" transform="rotate(22 147 70)"/></g>';
}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("promptBox").innerText);
alert("Prompt kopiert.");
}

function downloadPNG(){
const svg=document.getElementById("art");
const data=new XMLSerializer().serializeToString(svg);
const canvas=document.createElement("canvas");
canvas.width=1200;canvas.height=1500;
const ctx=canvas.getContext("2d");
const img=new Image();
const blob=new Blob([data],{type:"image/svg+xml;charset=utf-8"});
const url=URL.createObjectURL(blob);
img.onload=function(){
ctx.fillStyle="#000";ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0,canvas.width,canvas.height);
URL.revokeObjectURL(url);
const a=document.createElement("a");
a.download="new-dawn-tattoo-motive.png";
a.href=canvas.toDataURL("image/png");
a.click();
}
img.src=url;
}
generate();
</script>
</body>
</html>
